name: Build Signed DriveFlix APK

on:
  workflow_dispatch:
  push:
    branches: [main, master]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Prepare release keystore
        env:
          RELEASE_KEYSTORE_BASE64: ${{ secrets.RELEASE_KEYSTORE_BASE64 }}
          SECRET_STORE_PASSWORD: ${{ secrets.RELEASE_KEYSTORE_PASSWORD }}
          SECRET_KEY_ALIAS: ${{ secrets.RELEASE_KEY_ALIAS }}
          SECRET_KEY_PASSWORD: ${{ secrets.RELEASE_KEY_PASSWORD }}
        run: |
          set -e
          if [ -n "$RELEASE_KEYSTORE_BASE64" ] && [ -n "$SECRET_STORE_PASSWORD" ] && [ -n "$SECRET_KEY_ALIAS" ] && [ -n "$SECRET_KEY_PASSWORD" ]; then
            echo "Using release keystore from GitHub Secrets."
            printf '%s' "$RELEASE_KEYSTORE_BASE64" | base64 --decode > release.keystore
            STORE_PASSWORD="$SECRET_STORE_PASSWORD"
            KEY_ALIAS="$SECRET_KEY_ALIAS"
            KEY_PASSWORD="$SECRET_KEY_PASSWORD"
          else
            echo "GitHub signing secrets not found. Generating temporary release keystore."
            STORE_PASSWORD="driveflix123"
            KEY_ALIAS="driveflix"
            KEY_PASSWORD="driveflix123"
            keytool -genkeypair -v -keystore release.keystore -storepass "$STORE_PASSWORD" -keypass "$KEY_PASSWORD" -alias "$KEY_ALIAS" -keyalg RSA -keysize 2048 -validity 10000 -dname "CN=DriveFlix, OU=DriveFlix, O=DriveFlix, L=Unknown, S=Unknown, C=US"
            echo "generated=true" > generated-keystore.txt
            {
              echo "Generated keystore for DriveFlix"
              echo ""
              echo "Keystore file: release.keystore"
              echo "Keystore password: driveflix123"
              echo "Key alias: driveflix"
              echo "Key password: driveflix123"
              echo ""
              echo "IMPORTANT: Keep this keystore safe. Future app updates must be signed with the same keystore."
            } > generated-keystore-info.txt
          fi
          echo "RELEASE_KEYSTORE_PATH=$GITHUB_WORKSPACE/release.keystore" >> "$GITHUB_ENV"
          echo "RELEASE_KEYSTORE_PASSWORD=$STORE_PASSWORD" >> "$GITHUB_ENV"
          echo "RELEASE_KEY_ALIAS=$KEY_ALIAS" >> "$GITHUB_ENV"
          echo "RELEASE_KEY_PASSWORD=$KEY_PASSWORD" >> "$GITHUB_ENV"

      - name: Build Signed Release APK
        run: gradle assembleRelease

      - name: Verify APK signature
        run: |
          APKSIGNER="$ANDROID_HOME/build-tools/$(ls "$ANDROID_HOME/build-tools" | sort -V | tail -1)/apksigner"
          "$APKSIGNER" verify --verbose app/build/outputs/apk/release/*.apk

      - name: Upload Signed APK
        uses: actions/upload-artifact@v4
        with:
          name: DriveFlix-signed-release-apk
          path: app/build/outputs/apk/release/*.apk

      - name: Upload generated keystore if no secrets were used
        if: ${{ hashFiles('generated-keystore.txt') != '' }}
        uses: actions/upload-artifact@v4
        with:
          name: DriveFlix-generated-keystore-KEEP-SAFE
          path: |
            release.keystore
            generated-keystore-info.txt
